version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: union_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-registro_muni_union}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-registro_muni_union}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./back
    container_name: union_api
    restart: always
    ports:
      - "4000:4000"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-registro_muni_union}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-clave_secreta_segura}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./back/uploads:/app/uploads

  frontend:
    build: 
      context: ./front
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: union_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      - backend

volumes:
  postgres_data:
